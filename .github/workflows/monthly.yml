name: Monthly Expert Monitor

# Запуск: 1-го числа каждого месяца в 9:00 UTC
# + ручной запуск в любое время
on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Expert Monitor
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and push report
        run: |
          git config user.name "Expert Monitor Bot"
          git config user.email "bot@expert-monitor"
          git add -A
          git diff --staged --quiet || git commit -m "📊 Отчёт за $(date +'%Y-%m-%d')"
          git pull --rebase
          git push
