name: Monthly Expert Monitor

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      issues: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Expert Monitor
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and push data
        run: |
          git config user.name "Expert Monitor Bot"
          git config user.email "bot@expert-monitor"
          git add -A
          git diff --staged --quiet || git commit -m "📊 Данные за $(date +'%Y-%m-%d')"
          git pull --rebase
          git push

      - name: Notify via GitHub Issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ITEMS=$(python3 -c "import json; d=json.load(open('data/filtered.json')); print(len(d))")
          gh issue create \
            --title "📊 Данные за $(date +'%B %Y') собраны — пора делать саммари" \
            --body "Собрано и отфильтровано **${ITEMS} материалов**.

          **Что делать:**
          1. Скачай [файл для Claude](https://elenates.github.io/expert-monitor/for_claude.md)
          2. Открой [claude.ai](https://claude.ai) → новый чат
          3. Прикрепи файл + промпт из [PROMPT_TEMPLATE.md](https://github.com/elenates/expert-monitor/blob/main/PROMPT_TEMPLATE.md)

          После получения саммари можешь закрыть этот issue."
